name: REUSE Compliance Check

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps: 
    - uses: actions/checkout@master
    - name: REUSE Compliance Check
      uses: fsfe/reuse-action@master
      with:
        cmd: ['--include-submodules', 'lint']
